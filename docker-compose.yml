services:
  db:
    image: postgres:16
    container_name: muse-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: muse
    volumes:
      - muse-db-data:/var/lib/postgresql/data

volumes:
  muse-db-data:
