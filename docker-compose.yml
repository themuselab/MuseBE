services:
  db:
    image: postgres:16
    container_name: muse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-muse}
    volumes:
      - muse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: muse-redis
    restart: unless-stopped
    volumes:
      - muse-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pil-service:
    build:
      context: ./pil-service
    container_name: muse-pil
    restart: unless-stopped
    # v3 GPT-vision typography spec 생성을 위한 OpenAI 키. 미주입 시 spec 생성 실패하면
    # legacy 단순 오버레이 경로로 자동 폴백되므로 서비스는 동작하지만 럭셔리 톤이 사라짐.
    env_file:
      - .env
    environment:
      # 한정된 키만 노출 (.env 전체는 BE만 알도록 — pil-service는 OPENAI만 필요).
      # env_file로 전부 들어오긴 하지만 명시적으로 알려진 의존만 적어둠.
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  be:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: muse-be
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-muse}?schema=public
      REDIS_URL: redis://redis:6379
      PIL_SERVICE_URL: http://pil-service:8001
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pil-service:
        condition: service_started

volumes:
  muse-db-data:
  muse-redis-data:
