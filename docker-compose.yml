services:
  db:
    image: postgres:16
    container_name: muse-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: muse
    volumes:
      - muse-db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: muse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - muse-redis-data:/data

  pil-service:
    build:
      context: ./pil-service
    container_name: muse-pil
    restart: unless-stopped
    ports:
      - "8001:8001"

volumes:
  muse-db-data:
  muse-redis-data:
