paths:
  /catalog-models:
    get:
      tags: [CatalogModels]
      summary: 카탈로그 모델 목록 조회
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: gender
          schema: { type: string, enum: [all, female, male] }
        - in: query
          name: age
          schema: { type: string, enum: [all, "20s", "30s", "40s", "50s", "60s_plus"] }
        - in: query
          name: primaryLabel
          schema:
            type: string
            enum: [all, trust, friendly, intimate, sophisticated, lively, comfortable]
        - in: query
          name: keyword
          schema: { type: string }
      responses:
        "200":
          description: 모델 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      total: { type: integer }
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/CatalogModel"
        "401":
          description: 인증 실패

  /catalog-models/top:
    get:
      tags: [CatalogModels]
      summary: Top 5 모델 (사용량 내림차순, 동률 시 최신 등록순)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Top 5
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          allOf:
                            - $ref: "#/components/schemas/CatalogModel"
                            - type: object
                              properties:
                                rank: { type: integer, example: 1 }
                                usageCount: { type: integer, example: 42 }

components:
  schemas:
    CatalogModel:
      type: object
      properties:
        id: { type: string }
        name: { type: string, example: "지유" }
        gender: { type: string, example: "여" }
        age: { type: string, example: "20대" }
        primaryLabel: { type: string, example: "sophisticated" }
        imageUrl: { type: string }
        imageUrls:
          type: array
          items: { type: string }
          description: 갤러리 이미지 6장
        scores:
          type: object
          properties:
            trust: { type: integer }
            sophisticated: { type: integer }
            friendly: { type: integer }
            stable: { type: integer }
            cheerful: { type: integer }
        tags:
          type: array
          items: { type: string }
          example: ["세련됨", "신뢰감"]
        recommendedIndustries:
          type: array
          items: { type: string }
        rank:
          type: integer
          nullable: true
