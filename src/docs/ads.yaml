paths:
  /ads/moods:
    post:
      tags: [Ads]
      summary: 광고 분위기 추천 (GPT-4o-mini)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [industry, item]
              properties:
                industry: { type: string, example: "카페" }
                item: { type: string, example: "라떼" }
                extraDescription: { type: string }
      responses:
        "200":
          description: 분위기 추천 5개 (첫 번째 항목이 ranking="AI PICK")
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      moods:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, example: "calm" }
                            label: { type: string, example: "차분한" }
                            subtitle: { type: string, example: "소프트하고 부드러운 무드" }
                            ranking:
                              type: string
                              nullable: true
                              enum: ["AI PICK", null]
        "400":
          description: 입력 검증 실패

  /ads/products:
    post:
      tags: [Ads]
      summary: 제품 이미지 업로드 (광고 생성 전 단계)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [productImage]
              properties:
                productImage:
                  type: string
                  format: binary
                  description: png/jpeg/webp, 최대 10MB
      responses:
        "201":
          description: 업로드 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      productImagePath:
                        type: string
                        example: /uploads/products/{userId}/abc.png
                      filename: { type: string }
                      size: { type: integer }
        "400":
          description: 파일 누락 또는 mimetype/size 위반

  /ads/generate:
    post:
      tags: [Ads]
      summary: 광고 이미지 생성 작업 등록 (비동기)
      description: 사전에 POST /ads/products로 업로드한 productImagePath를 함께 전달
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [catalogModelId, prompt, productImagePath]
              properties:
                catalogModelId: { type: string }
                productImagePath:
                  type: string
                  example: /uploads/products/{userId}/abc.png
                prompt: { type: string }
                headline: { type: string }
                subhead: { type: string }
                industry: { type: string }
                item: { type: string }
                extraDescription: { type: string }
                mood: { type: string }
                preferredLabel:
                  type: string
                  description: 카탈로그 모델 자동 추천에 사용 (신뢰감/세련됨/친근함/편안함/전문성/활기참)
                aspectRatio:
                  type: string
                  enum: ["9:16", "1:1", "16:9"]
                  description: 광고 이미지 비율 (default 9:16)
      responses:
        "202":
          description: 작업 큐잉 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      jobId: { type: string }
                      status: { type: string, example: queued }
                      estimatedSeconds: { type: integer }
                      pollUrl: { type: string }
        "400":
          description: 입력 검증 실패
        "404":
          description: 카탈로그 모델 없음

  /ads/jobs:
    get:
      tags: [Ads]
      summary: 내 광고 생성 히스토리 목록
      description: |
        본인이 생성한 잡 목록. status 미지정 시 failed 잡은 기본 제외.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [queued, processing, completed, failed] }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: 히스토리 페이지
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string }
                            status: { type: string, enum: [queued, processing, completed] }
                            modelName: { type: string, nullable: true, description: "catalogModel.name" }
                            catalogModelId: { type: string, nullable: true }
                            item: { type: string, nullable: true, description: "사용자가 입력한 아이템(상품)명" }
                            resultUrl: { type: string, nullable: true }
                            baseImageUrl: { type: string, nullable: true, description: "진행 중일 때 표시할 모델 베이스 이미지" }
                            createdAt: { type: string, format: date-time }
                      nextCursor: { type: string, nullable: true }

  /ads/jobs/{id}:
    get:
      tags: [Ads]
      summary: 광고 작업 상세 조회 (폴링용, 본인 것만)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 작업 상태 + 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      status: { type: string }
                      progress: { type: integer }
                      resultUrl: { type: string, nullable: true }
                      baseImageUrl:
                        type: string
                        nullable: true
                        description: 텍스트 없는 베이스 이미지 (재편집 endpoint용)
                      cta:
                        type: string
                        nullable: true
                        description: AI 추천 CTA 텍스트
                      errorMessage: { type: string, nullable: true }
                      intermediateUrls: { type: object, nullable: true }
                      textOverlays:
                        type: array
                        nullable: true
                        items: { type: object }
                      costCents: { type: integer, nullable: true }
        "403":
          description: 본인 작업이 아님 (AD_JOB_FORBIDDEN)
        "404":
          description: 작업 없음
    delete:
      tags: [Ads]
      summary: 광고 작업 삭제 (히스토리에서 제거)
      description: |
        DB row + 관련 이미지 파일(resultUrl, originalResultUrl, baseImageUrl,
        intermediateUrls, productImagePath) 함께 하드 삭제. 진행 중(queued/processing)
        잡은 거부.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 삭제 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      id: { type: string }
        "404":
          description: 잡 없음 또는 본인 잡 아님 (AD_JOB_NOT_FOUND)
        "409":
          description: 진행 중 (AD_JOB_BUSY)

  /ads/jobs/{id}/download:
    get:
      tags: [Ads]
      summary: 완료된 광고 이미지 다운로드
      description: |
        Content-Disposition: attachment 로 응답. 파일명은
        muse-{모델명}-{YYYY-MM-DD}.{ext}. status != completed 잡은 거부.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 이미지 바이너리
          content:
            image/png:
              schema: { type: string, format: binary }
        "400":
          description: 완료되지 않은 잡 (AD_JOB_NOT_DOWNLOADABLE)
        "404":
          description: 잡 없음 또는 본인 잡 아님

  /ads/jobs/{id}/re-overlay:
    post:
      tags: [Ads]
      summary: 광고 텍스트 재편집 (PIL만 재호출, GPT 비호출)
      description: |
        흰디 패턴의 핵심. baseImageUrl을 사용해 PIL overlay만 다시 호출.
        GPT 미호출이므로 비용 0¢. 사용자가 헤드라인/서브카피/CTA만 바꾸고 싶을 때 사용.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [headline]
              properties:
                headline: { type: string, maxLength: 100 }
                subhead: { type: string, maxLength: 200 }
                cta: { type: string, maxLength: 50 }
      responses:
        "200":
          description: 재합성 완료, 새 resultUrl 반환
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        "400":
          description: baseImageUrl 없음 또는 입력 검증 실패
        "403":
          description: 본인 작업이 아님
        "404":
          description: 작업 없음
