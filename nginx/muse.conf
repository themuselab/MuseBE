# /etc/nginx/sites-available/muse
# 사용법: VM 위 nginx 설치 후 이 파일을 복사하고 server_name만 도메인에 맞게 둔 뒤
#   sudo ln -s /etc/nginx/sites-available/muse /etc/nginx/sites-enabled/muse
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.themuselab.kr   ← certbot이 80→443 리다이렉트와 ssl_* 라인 자동 삽입

server {
    listen 80;
    server_name api.themuselab.kr;

    # 광고 결과/제품 이미지 업로드용. 50MB 여유.
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
    }
}
