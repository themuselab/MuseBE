name: Deploy BE to VM

on:
  push:
    branches: [main, feat/ai-ad-generation]
  workflow_dispatch:

concurrency:
  group: deploy-be-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/muse-be
            git fetch --all --prune
            git checkout ${GITHUB_REF_NAME:-main}
            git reset --hard origin/${GITHUB_REF_NAME:-main}
            docker compose build be
            docker compose up -d be
            docker compose exec -T be npx prisma migrate deploy
            docker image prune -f
            sleep 3
            curl -fsS http://127.0.0.1:4000/health
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
